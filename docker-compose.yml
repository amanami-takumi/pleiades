services:
  backend:
    container_name: backend_pleiades
    build:
      context: .
      dockerfile: dockerfile.backend
    volumes:
      - ./backend:/usr/src/backend
      - ./data:/usr/src/data
    ports:
      - "${BACKEND_PORT:-5050}:5050"
    environment:
      - DATABASE_PATH=/usr/src/data/pleiades.sqlite3
      - CORS_ORIGINS=http://localhost:${APP_PORT:-3050},http://127.0.0.1:${APP_PORT:-3050}
      - YFINANCE_REQUEST_INTERVAL_SECONDS=${YFINANCE_REQUEST_INTERVAL_SECONDS:-2}
      - YFINANCE_SYMBOL_INTERVAL_SECONDS=${YFINANCE_SYMBOL_INTERVAL_SECONDS:-5}
      - YFINANCE_RETRY_COUNT=${YFINANCE_RETRY_COUNT:-2}
      - YFINANCE_RATE_LIMIT_BACKOFF_SECONDS=${YFINANCE_RATE_LIMIT_BACKOFF_SECONDS:-60}
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 5050 --reload"
    restart: unless-stopped

  app:
    container_name: app_pleiades
    build:
      context: .
      dockerfile: dockerfile.app
    volumes:
      - ./frontend:/usr/src/app
    ports:
      - "${APP_PORT:-3050}:3000"
    environment:
      - API_PROXY_TARGET=http://backend:5050
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    restart: unless-stopped
