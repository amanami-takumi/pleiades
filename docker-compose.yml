services:
  backend:
    container_name: backend_pleiades
    build:
      context: .
      dockerfile: dockerfile.backend
    volumes:
      - ./backend:/usr/src/backend
      - ./data:/usr/src/data
      - ./売買ルール.csv:/usr/src/売買ルール.csv:ro
      - ./quant_rules_categorized.csv:/usr/src/quant_rules_categorized.csv:ro
      - ./category_interaction_matrix.csv:/usr/src/category_interaction_matrix.csv:ro
      - ./銀行取引明細（サンプル）.csv:/usr/src/銀行取引明細（サンプル）.csv:ro
      - ./デビットカード明細（サンプル）.csv:/usr/src/デビットカード明細（サンプル）.csv:ro
    ports:
      - "${BACKEND_PORT:-5050}:5050"
    environment:
      - DATABASE_PATH=/usr/src/data/pleiades.sqlite3
      - CORS_ORIGINS=http://localhost:${APP_PORT:-3050},http://127.0.0.1:${APP_PORT:-3050}
      - MARKET_REQUEST_INTERVAL_SECONDS=${MARKET_REQUEST_INTERVAL_SECONDS:-2}
      - MARKET_SYMBOL_INTERVAL_SECONDS=${MARKET_SYMBOL_INTERVAL_SECONDS:-5}
      - MARKET_RETRY_COUNT=${MARKET_RETRY_COUNT:-2}
      - MARKET_RATE_LIMIT_BACKOFF_SECONDS=${MARKET_RATE_LIMIT_BACKOFF_SECONDS:-60}
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 5050 --reload"
    restart: unless-stopped

  app:
    container_name: app_pleiades
    build:
      context: .
      dockerfile: dockerfile.app
    volumes:
      - ./frontend:/usr/src/app
    ports:
      - "${APP_PORT:-3050}:3000"
    environment:
      - API_PROXY_TARGET=http://backend:5050
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    restart: unless-stopped
